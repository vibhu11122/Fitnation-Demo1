<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFF India - New Fitness Factory</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide Scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Safe area for mobile bottom nav */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 80px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-safe selection:bg-orange-500 selection:text-white">

    <!-- Top Navigation Bar -->
    <nav class="bg-zinc-900/95 backdrop-blur-md sticky top-0 z-50 px-4 py-3 border-b border-zinc-800 flex justify-between items-center shadow-md">
        <div class="flex items-center cursor-pointer" onclick="navigateTo('home')">

            <i data-lucide="dumbbell" class="h-6 w-6 text-orange-500 mr-2"></i>
            <span class="font-bold text-lg tracking-wider text-white">NFF <span class="text-orange-500">INDIA</span></span>
        </div>
        <div class="flex items-center space-x-3">
            <button class="p-2 text-zinc-400 hover:text-white">
                <i data-lucide="bell" class="h-6 w-6"></i>
            </button>
            <button onclick="navigateTo('cart')" class="relative p-2">
                <i data-lucide="shopping-cart" class="h-6 w-6 text-zinc-300"></i>
                <span id="cart-badge" class="hidden absolute top-0 right-0 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-orange-600 rounded-full">
                    0
                </span>
            </button>
            <div class="w-8 h-8 bg-gradient-to-tr from-orange-500 to-orange-600 rounded-full flex items-center justify-center shadow-lg">
                <i data-lucide="user" class="h-4 w-4 text-white"></i>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app" class="flex-grow max-w-lg mx-auto w-full md:max-w-none md:mx-0">
        <!-- Content injected via JavaScript -->
    </main>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 pt-2 px-6 z-50 shadow-[0_-5px_10px_rgba(0,0,0,0.3)] pb-safe">
        <div class="flex justify-between items-center pb-2" id="bottom-nav-items">
            <!-- Nav Items injected via JS -->
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // --- Data ---
        const CITIES = ["Delhi", "Mumbai", "Bangalore", "Pune", "Hyderabad", "Chennai"];

        const GYMS = [
            { id: 1, name: "Iron Pump Gym", type: "Traditional Gym", city: "Delhi", area: "Connaught Place", rating: 4.8, image: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=500", price: "₹1500/mo" },
            { id: 2, name: "Tiger MMA Dojo", type: "MMA & Combat", city: "Mumbai", area: "Bandra West", rating: 4.9, image: "https://images.unsplash.com/photo-1599058945522-28d584b6f0ff?auto=format&fit=crop&q=80&w=500", price: "₹2500/mo" },
            { id: 3, name: "Zenith Yoga Studio", type: "Yoga & Pilates", city: "Bangalore", area: "Indiranagar", rating: 4.7, image: "https://images.unsplash.com/photo-1599901860904-17e6ed7083a0?auto=format&fit=crop&q=80&w=500", price: "₹2000/mo" },
            { id: 4, name: "CrossFit Titan", type: "CrossFit", city: "Delhi", area: "Hauz Khas", rating: 4.6, image: "https://images.unsplash.com/photo-1517963879466-e925ac69aa18?auto=format&fit=crop&q=80&w=500", price: "₹3000/mo" },
            { id: 5, name: "Muscle Factory", type: "Traditional Gym", city: "Pune", area: "Koregaon Park", rating: 4.5, image: "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&q=80&w=500", price: "₹1200/mo" }
        ];

        const PRODUCTS = [
            { id: 101, name: "Whey Protein Isolate", brand: "IronFuel", price: 2499, image: "https://images.unsplash.com/photo-1593095948071-474c5cc2989d?auto=format&fit=crop&q=80&w=300", category: "Supplements" },
            { id: 102, name: "Pre-Workout Ignition", brand: "Voltage", price: 1899, image: "https://images.unsplash.com/photo-1579722820308-d74e571900a9?auto=format&fit=crop&q=80&w=300", category: "Supplements" },
            { id: 103, name: "Pro Lifting Straps", brand: "GripMaster", price: 499, image: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&q=80&w=300", category: "Gear" },
            { id: 104, name: "Mass Gainer Complex", brand: "BigBuild", price: 3200, image: "https://images.unsplash.com/photo-1579722822555-6490656e40d8?auto=format&fit=crop&q=80&w=300", category: "Supplements" }
        ];

        const COMPETITIONS = [
            { id: 201, title: "Mr. Delhi Classic 2025", date: "March 15", location: "Talkatora Stadium", prize: "₹5L", category: "Bodybuilding" },
            { id: 202, title: "National MMA Champ", date: "April 02", location: "NSCI Dome", prize: "₹10L", category: "Combat Sports" },
            { id: 203, title: "Iron Woman Power", date: "May 20", location: "Bangalore Palace", prize: "₹3L", category: "Powerlifting" }
        ];

        // --- State ---
        let state = {
            activeTab: 'home',
            cart: [],
            selectedCity: 'All',
            searchQuery: ''
        };

        // --- Core Functions ---

        function navigateTo(tab) {
            state.activeTab = tab;
            render();
        }

        function addToCart(productId) {
            const product = PRODUCTS.find(p => p.id === productId);
            if (product) {
                state.cart.push(product);
                updateCartBadge();
                // Visual feedback could be added here
                alert(`${product.name} added to cart!`);
            }
        }

        function removeFromCart(index) {
            state.cart.splice(index, 1);
            render(); // Re-render to update cart view
            updateCartBadge();
        }

        function updateCartBadge() {
            const badge = document.getElementById('cart-badge');
            if (state.cart.length > 0) {
                badge.classList.remove('hidden');
                badge.textContent = state.cart.length;
            } else {
                badge.classList.add('hidden');
            }
        }

        function filterGyms() {
            return GYMS.filter(gym => {
                const matchesCity = state.selectedCity === "All" || gym.city === state.selectedCity;
                const matchesSearch = gym.name.toLowerCase().includes(state.searchQuery.toLowerCase()) || 
                                      gym.area.toLowerCase().includes(state.searchQuery.toLowerCase());
                return matchesCity && matchesSearch;
            });
        }

        // --- Render Views ---

        function getDashboardHeroHTML() {
            return `
                <div class="px-4 py-6 fade-in">
                    <div class="bg-gradient-to-br from-zinc-800 to-zinc-900 rounded-3xl overflow-hidden shadow-2xl border border-zinc-700/50 relative">
                        <div class="absolute top-0 right-0 p-4 opacity-10">
                            <i data-lucide="dumbbell" class="h-48 w-48 text-orange-500 transform rotate-12 -translate-y-8 translate-x-8"></i>
                        </div>
                        <div class="p-6 relative z-10">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="text-orange-500 font-semibold text-xs uppercase tracking-wider mb-1">Welcome Back</p>
                                    <h1 class="text-2xl font-bold text-white">Ready to Train?</h1>
                                </div>
                            </div>
                            <p class="text-zinc-400 text-sm mb-6 max-w-[80%]">Find a gym near you or stock up on supplements for your next session.</p>
                            <div class="flex gap-3">
                                <button onclick="navigateTo('gyms')" class="flex-1 bg-orange-600 active:bg-orange-700 text-white py-3 rounded-xl text-sm font-bold shadow-lg shadow-orange-900/20 transition-transform active:scale-95">Find Gyms</button>
                                <button onclick="navigateTo('store')" class="flex-1 bg-zinc-700 active:bg-zinc-600 text-white py-3 rounded-xl text-sm font-bold transition-transform active:scale-95">Shop</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Quick Stats -->
                    <div class="flex gap-3 mt-4 overflow-x-auto pb-2 no-scrollbar">
                        <div class="min-w-[140px] bg-zinc-800/50 p-3 rounded-xl border border-zinc-800">
                            <div class="text-zinc-400 text-xs mb-1">Active Plan</div>
                            <div class="text-white font-bold">Gold Tier</div>
                        </div>
                        <div class="min-w-[140px] bg-zinc-800/50 p-3 rounded-xl border border-zinc-800">
                            <div class="text-zinc-400 text-xs mb-1">Next Event</div>
                            <div class="text-white font-bold">Mr. Delhi</div>
                        </div>
                        <div class="min-w-[140px] bg-zinc-800/50 p-3 rounded-xl border border-zinc-800">
                            <div class="text-zinc-400 text-xs mb-1">Points</div>
                            <div class="text-orange-500 font-bold">450 pts</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getHomeView() {
            const hero = getDashboardHeroHTML();
            
            const featuredGyms = GYMS.slice(0, 3).map(gym => `
                <div class="bg-zinc-900 rounded-xl p-3 flex gap-3 border border-zinc-800 cursor-pointer" onclick="navigateTo('gyms')">
                    <img src="${gym.image}" class="w-20 h-20 object-cover rounded-lg bg-zinc-800" alt="${gym.name}"/>
                    <div>
                        <h3 class="font-bold text-sm text-white">${gym.name}</h3>
                        <p class="text-zinc-500 text-xs mt-1">${gym.area}, ${gym.city}</p>
                        <div class="mt-2 text-xs font-medium text-orange-500 bg-orange-500/10 inline-block px-2 py-0.5 rounded">
                            ${gym.type}
                        </div>
                    </div>
                </div>
            `).join('');

            return `
                ${hero}
                <div class="px-4 fade-in">
                    <div class="flex justify-between items-end mb-4 mt-6">
                        <h2 class="text-lg font-bold text-white">Featured Gyms</h2>
                        <button onclick="navigateTo('gyms')" class="text-orange-500 text-xs font-bold">See All</button>
                    </div>
                    <div class="space-y-3 pb-24">
                        ${featuredGyms}
                    </div>
                </div>
            `;
        }

        function getGymsView() {
            const filtered = filterGyms();
            
            const citiesHtml = ['All', ...CITIES].map(city => `
                <button 
                    onclick="state.selectedCity = '${city}'; render();"
                    class="whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium ${state.selectedCity === city ? 'bg-orange-600 text-white' : 'bg-zinc-800 text-zinc-400'}"
                >
                    ${city === 'All' ? 'All Cities' : city}
                </button>
            `).join('');

            const gymsHtml = filtered.map(gym => `
                <div class="bg-zinc-800 rounded-2xl overflow-hidden shadow-sm border border-zinc-700/50 active:scale-[0.99] transition-transform">
                    <div class="flex">
                        <div class="w-32 h-32 relative flex-shrink-0">
                            <img src="${gym.image}" alt="${gym.name}" class="w-full h-full object-cover" />
                            <div class="absolute top-1 left-1 bg-black/60 backdrop-blur-md px-1.5 py-0.5 rounded text-[10px] font-bold text-white flex items-center">
                                <i data-lucide="star" class="w-2.5 h-2.5 mr-0.5 fill-orange-500 text-orange-500"></i>
                                ${gym.rating}
                            </div>
                        </div>
                        <div class="p-3 flex flex-col justify-between flex-grow">
                            <div>
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold text-white leading-tight">${gym.name}</h3>
                                    <span class="text-[10px] bg-zinc-700 text-zinc-300 px-1.5 py-0.5 rounded">${gym.type.split(' ')[0]}</span>
                                </div>
                                <div class="flex items-center text-zinc-400 text-xs mt-1">
                                    <i data-lucide="map-pin" class="w-3 h-3 mr-1"></i>
                                    ${gym.area}, ${gym.city}
                                </div>
                            </div>
                            <div class="flex justify-between items-end mt-2">
                                <span class="text-orange-400 font-bold text-sm">${gym.price}</span>
                                <button class="bg-white text-black px-3 py-1.5 rounded-lg text-xs font-bold">View</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            return `
                <div class="px-4 pb-24 pt-4 fade-in">
                    <div class="flex gap-2 mb-4 overflow-x-auto no-scrollbar pb-1">
                        ${citiesHtml}
                    </div>

                    <div class="relative mb-6">
                        <i data-lucide="search" class="absolute left-4 top-3.5 h-5 w-5 text-zinc-500"></i>
                        <input
                            type="text"
                            placeholder="Search gyms..."
                            class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-3.5 pl-12 pr-4 text-white placeholder-zinc-500 focus:outline-none focus:border-orange-500 transition-colors"
                            value="${state.searchQuery}"
                            oninput="state.searchQuery = this.value; render();"
                            onblur="this.focus()"
                        />
                    </div>

                    <div class="space-y-4">
                        ${gymsHtml}
                    </div>
                </div>
            `;
        }

        function getStoreView() {
            const productsHtml = PRODUCTS.map(product => `
                <div class="bg-zinc-800 rounded-2xl p-3 border border-zinc-700 relative group">
                    <div class="bg-zinc-700/50 rounded-xl h-32 mb-3 overflow-hidden flex items-center justify-center p-2">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-contain mix-blend-overlay" />
                    </div>
                    <div class="mb-2">
                        <h3 class="font-bold text-white text-sm leading-tight line-clamp-2 min-h-[2.5rem]">${product.name}</h3>
                        <p class="text-zinc-500 text-xs mt-1">${product.brand}</p>
                    </div>
                    <div class="flex items-center justify-between mt-2">
                        <span class="text-white font-bold">₹${product.price}</span>
                        <button onclick="addToCart(${product.id})" class="bg-orange-600 active:bg-orange-700 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg transition-transform active:scale-90">
                            <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            return `
                <div class="px-4 pb-24 pt-4 fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-white">Popular Gear</h2>
                        <span class="text-orange-500 text-sm font-medium">See All</span>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        ${productsHtml}
                    </div>
                    
                    <div class="mt-8 bg-gradient-to-r from-zinc-800 to-zinc-900 rounded-2xl p-5 border border-zinc-700 flex items-center justify-between">
                        <div>
                            <h3 class="font-bold text-white mb-1">Pro Member?</h3>
                            <p class="text-zinc-400 text-xs max-w-[150px]">Get 20% off instantly on all supplements.</p>
                        </div>
                        <i data-lucide="chevron-right" class="text-zinc-600"></i>
                    </div>
                </div>
            `;
        }

        function getCompetitionsView() {
            const compHtml = COMPETITIONS.map(comp => `
                <div class="bg-zinc-800 rounded-2xl p-4 border border-zinc-700 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-24 h-full bg-gradient-to-l from-orange-900/20 to-transparent pointer-events-none"></div>
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-[10px] font-bold uppercase tracking-wider text-orange-500 bg-orange-950/30 px-2 py-1 rounded-full border border-orange-500/20">
                            ${comp.category}
                            </span>
                        </div>
                        <div class="text-right">
                            <span class="block text-xs text-zinc-500">Prize Pool</span>
                            <span class="block text-lg font-bold text-yellow-500">${comp.prize}</span>
                        </div>
                    </div>
                    
                    <h3 class="text-lg font-bold text-white mb-1">${comp.title}</h3>
                    
                    <div class="flex items-center gap-4 text-zinc-400 text-sm mb-4">
                        <div class="flex items-center"><i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5"></i> ${comp.date}</div>
                        <div class="flex items-center"><i data-lucide="map-pin" class="w-3.5 h-3.5 mr-1.5"></i> ${comp.location}</div>
                    </div>

                    <button onclick="alert('Registered for ${comp.title}!')" class="w-full bg-white text-black py-3 rounded-xl font-bold text-sm active:bg-zinc-200 transition-colors">
                        Register
                    </button>
                </div>
            `).join('');

            return `
                <div class="px-4 pb-24 pt-4 fade-in">
                    <h2 class="text-xl font-bold text-white mb-6">Upcoming Events</h2>
                    <div class="space-y-4">
                        ${compHtml}
                    </div>
                </div>
            `;
        }

        function getCartView() {
            const total = state.cart.reduce((sum, item) => sum + item.price, 0);
            
            let contentHtml = '';
            if (state.cart.length === 0) {
                contentHtml = `
                    <div class="flex flex-col items-center justify-center h-[50vh] text-zinc-500">
                        <i data-lucide="shopping-bag" class="w-12 h-12 mb-4 opacity-20"></i>
                        <p>Your cart is empty.</p>
                    </div>
                `;
            } else {
                const itemsHtml = state.cart.map((item, index) => `
                    <div class="bg-zinc-900 rounded-2xl p-3 flex items-center border border-zinc-800">
                        <div class="w-16 h-16 bg-zinc-800 rounded-xl flex items-center justify-center flex-shrink-0">
                            <img src="${item.image}" alt="${item.name}" class="w-12 h-12 object-contain" />
                        </div>
                        <div class="ml-3 flex-grow">
                            <h4 class="text-white font-medium text-sm line-clamp-1">${item.name}</h4>
                            <div class="text-orange-500 font-bold text-sm mt-1">₹${item.price}</div>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-zinc-600 hover:text-red-500 p-2">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `).join('');

                contentHtml = `
                    <div class="space-y-4">
                        ${itemsHtml}
                        <div class="fixed bottom-24 left-4 right-4 bg-zinc-800 p-4 rounded-2xl border border-zinc-700 shadow-xl z-40">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-zinc-400 text-sm">Total</span>
                                <span class="text-xl font-bold text-white">₹${total}</span>
                            </div>
                            <button class="w-full bg-orange-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-orange-900/20 active:scale-[0.98] transition-transform">
                                Checkout
                            </button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="px-4 pb-24 pt-4 min-h-screen bg-black fade-in">
                    <div class="flex items-center mb-6">
                        <button onclick="navigateTo('store')" class="mr-3 p-2 bg-zinc-800 rounded-full text-zinc-400">
                            <i data-lucide="chevron-right" class="w-5 h-5 rotate-180"></i>
                        </button>
                        <h2 class="text-xl font-bold text-white">Your Cart</h2>
                    </div>
                    ${contentHtml}
                </div>
            `;
        }

        // --- Render Loop ---

        function renderBottomNav() {
            const navItems = [
                { id: 'home', label: 'Home', icon: 'activity' },
                { id: 'gyms', label: 'Gyms', icon: 'map-pin' },
                { id: 'store', label: 'Store', icon: 'shopping-bag' },
                { id: 'compete', label: 'Events', icon: 'trophy' },
            ];

            const html = navItems.map(item => `
                <button
                    onclick="navigateTo('${item.id}')"
                    class="flex flex-col items-center justify-center w-16 transition-all duration-200 ${state.activeTab === item.id ? 'text-orange-500 transform -translate-y-1' : 'text-zinc-500'}"
                >
                    <div class="p-1 rounded-full ${state.activeTab === item.id ? 'bg-orange-500/10' : ''}">
                        <i data-lucide="${item.icon}" class="h-6 w-6 ${state.activeTab === item.id ? 'fill-current' : ''}"></i>
                    </div>
                    <span class="text-[10px] font-medium mt-1">${item.label}</span>
                </button>
            `).join('');

            document.getElementById('bottom-nav-items').innerHTML = html;
        }

        function render() {
            const app = document.getElementById('app');
            
            // Basic Router
            switch (state.activeTab) {
                case 'home': app.innerHTML = getHomeView(); break;
                case 'gyms': app.innerHTML = getGymsView(); break;
                case 'store': app.innerHTML = getStoreView(); break;
                case 'compete': app.innerHTML = getCompetitionsView(); break;
                case 'cart': app.innerHTML = getCartView(); break;
            }

            // Update Nav
            renderBottomNav();
            
            // Re-initialize icons
            lucide.createIcons();
            
            // Maintain input focus if searching
            if (state.activeTab === 'gyms' && state.searchQuery) {
                const input = document.querySelector('input');
                if(input) {
                    input.focus();
                    // Move cursor to end
                    const len = input.value.length;
                    input.setSelectionRange(len, len);
                }
            }
        }

        // Init
        render();
        updateCartBadge();

    </script>
</body>
</html>
